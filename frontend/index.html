<!DOCTYPE html>
<html>
<head>
  <title>Engineering Standards Chatbot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc, #ecfeff);
      color: #111827;
      height: 100vh;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      padding: 20px 0;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: linear-gradient(90deg, #4f46e5, #06b6d4);
      color: white;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      letter-spacing: -1px;
    }

    .subtitle {
      margin-top: 10px;
      color: #4b5563;
      font-size: 17px;
    }

    .chat-window {
      flex: 1;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(15, 23, 42, 0.12);
      padding: 24px;
      overflow-y: auto;
    }

    .message {
      max-width: 78%;
      padding: 14px 16px;
      border-radius: 18px;
      margin-bottom: 16px;
      line-height: 1.5;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .bot {
      background: #f3f4f6;
      color: #111827;
      border-top-left-radius: 6px;
    }

    .user {
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
      margin-left: auto;
      border-top-right-radius: 6px;
    }

    .composer {
      margin-top: 18px;
      background: white;
      border-radius: 22px;
      padding: 14px;
      display: flex;
      gap: 12px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.14);
      border: 1px solid #e5e7eb;
    }

    textarea {
      flex: 1;
      border: none;
      resize: none;
      outline: none;
      font-size: 16px;
      min-height: 54px;
      max-height: 160px;
      font-family: inherit;
      padding: 12px;
    }

    button {
      width: 52px;
      height: 52px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      color: white;
      font-size: 22px;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      box-shadow: 0 10px 22px rgba(79, 70, 229, 0.3);
    }

    button:hover {
      transform: translateY(-1px);
    }

    .hint {
      text-align: center;
      font-size: 13px;
      color: #6b7280;
      margin-top: 10px;
    }

    @media (max-width: 700px) {
      .app { padding: 16px; }
      h1 { font-size: 30px; }
      .message { max-width: 92%; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="badge">Enterprise AI Assistant</div>
      <h1>Engineering Standards Chatbot</h1>
      <div class="subtitle">Ask questions about engineering standards, patterns, and governance.</div>
    </div>

    <div id="chatWindow" class="chat-window">
      <div class="message bot">
        Hi Ranbir, I can help you understand engineering standards. Ask me a question to get started.
      </div>
    </div>

    <div class="composer">
      <textarea id="question" placeholder="Ask about engineering standards..." onkeydown="handleKey(event)"></textarea>
      <button onclick="askQuestion()">➜</button>
    </div>

    <div class="hint">Press Enter to send • Shift + Enter for new line</div>
  </div>

  <script>
    function addMessage(text, type) {
      const chatWindow = document.getElementById("chatWindow");
      const message = document.createElement("div");
      message.className = "message " + type;
      message.innerText = text;
      chatWindow.appendChild(message);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function askQuestion() {
      const input = document.getElementById("question");
      const question = input.value.trim();
      if (!question) return;

      addMessage(question, "user");
      input.value = "";

      addMessage("Thinking...", "bot");

      const messages = document.querySelectorAll(".message.bot");
      const thinkingMessage = messages[messages.length - 1];

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ question })
        });

        const data = await response.json();
        thinkingMessage.innerText = data.answer || "No response received.";
      } catch (error) {
        thinkingMessage.innerText = "Unable to reach the backend API. Please check the Container App link.";
      }
    }

    function handleKey(event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        askQuestion();
      }
    }
  </script>
</body>
</html>
